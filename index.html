<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Свиток Красок</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #0b0805;
      --wood:          #1c1008;
      --wood-mid:      #2e1a0c;
      --wood-light:    #4a2c14;
      --gold:          #c49a28;
      --gold-bright:   #f0c850;
      --gold-glow:     rgba(201,160,48,0.4);
      --gold-dim:      rgba(201,160,48,0.18);
      --ink:           #f0e5cc;
      --ink-dim:       #9a8060;
      --stone:         #060402;
      --stone-mid:     #0a0806;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'IM Fell English', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 15%, rgba(80,30,10,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 85%, rgba(30,10,70,0.3) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(40,20,5,0.2) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header-runes {
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 14px;
      opacity: 0.55;
      margin-bottom: 10px;
      animation: runeGlow 4s ease-in-out infinite;
    }

    @keyframes runeGlow {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 0.85; text-shadow: 0 0 12px var(--gold-glow); }
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 5vw, 2.1rem);
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--gold-bright);
      text-shadow:
        0 0 18px var(--gold-glow),
        0 0 40px rgba(201,160,48,0.2),
        0 2px 6px rgba(0,0,0,0.9);
      margin-bottom: 8px;
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      color: var(--ink-dim);
      font-size: 0.68rem;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    /* ── Grimoire shell ── */
    .grimoire {
      width: 100%;
      max-width: 520px;
      background: linear-gradient(175deg, #1a0e06 0%, #0e0904 100%);
      border: 1px solid var(--wood-light);
      border-radius: 3px;
      box-shadow:
        0 0 0 3px var(--wood),
        0 0 0 4px rgba(201,160,48,0.12),
        0 24px 60px rgba(0,0,0,0.85),
        0 6px 20px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
    }

    /* Corner brackets */
    .grimoire::before,
    .grimoire::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(201,160,48,0.5);
      border-style: solid;
      z-index: 5;
    }
    .grimoire::before { top: 7px; left: 7px;  border-width: 1px 0 0 1px; }
    .grimoire::after  { top: 7px; right: 7px; border-width: 1px 1px 0 0; }

    .corner-bl, .corner-br {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(201,160,48,0.5);
      border-style: solid;
      z-index: 5;
    }
    .corner-bl { bottom: 7px; left: 7px;  border-width: 0 0 1px 1px; }
    .corner-br { bottom: 7px; right: 7px; border-width: 0 1px 1px 0; }

    /* Top beam */
    .beam {
      background: linear-gradient(180deg, var(--wood-light) 0%, var(--wood-mid) 100%);
      border-bottom: 1px solid rgba(201,160,48,0.25);
      padding: 9px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .beam-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 5px;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.7;
    }

    .rune-strip {
      display: flex;
      gap: 10px;
    }

    .rune {
      color: var(--gold);
      font-size: 1rem;
      opacity: 0.6;
    }
    .rune:nth-child(1) { animation: flicker 4.0s 0.0s infinite; }
    .rune:nth-child(2) { animation: flicker 3.5s 0.7s infinite; }
    .rune:nth-child(3) { animation: flicker 4.5s 1.4s infinite; }

    @keyframes flicker {
      0%, 80%, 100% { opacity: 0.6; text-shadow: none; }
      85%  { opacity: 0.2; }
      90%  { opacity: 0.8; text-shadow: 0 0 10px var(--gold-glow); }
    }

    /* Body */
    .grimoire-body {
      padding: 20px 20px 16px;
    }

    /* Section label */
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 0.66rem;
      letter-spacing: 3px;
      color: var(--gold);
      text-align: center;
      margin-bottom: 10px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* Reel window */
    .reel-section { margin-bottom: 12px; }

    .reel-window {
      position: relative;
      background: linear-gradient(180deg, var(--stone) 0%, var(--stone-mid) 100%);
      border: 1px solid rgba(201,160,48,0.22);
      border-radius: 4px;
      overflow: hidden;
      height: 110px;
      display: flex;
      box-shadow:
        inset 0 3px 10px rgba(0,0,0,0.9),
        inset 0 -1px 4px rgba(0,0,0,0.5);
    }

    .reel-window::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(201,160,48,0.04) 0%,
        transparent 30%,
        transparent 70%,
        rgba(0,0,0,0.25) 100%
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Subtle centre line */
    .reel-window::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,160,48,0.3), transparent);
      z-index: 11;
    }

    .reel {
      flex: 1;
      border-right: 1px solid rgba(201,160,48,0.08);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .reel:last-child { border-right: none; }

    .reel-strip {
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform;
    }

    .reel-item {
      height: 110px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 6px;
    }

    /* Gemstone orb */
    .reel-dot {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        0 0 10px currentColor,
        inset 0 3px 6px rgba(255,255,255,0.18),
        inset 0 -3px 6px rgba(0,0,0,0.5);
      flex-shrink: 0;
      transition: background-color 0.05s;
      position: relative;
    }

    /* Gem highlight */
    .reel-dot::after {
      content: '';
      position: absolute;
      top: 7px;
      left: 9px;
      width: 9px;
      height: 5px;
      background: rgba(255,255,255,0.32);
      border-radius: 50%;
      transform: rotate(-25deg);
    }

    .reel-name {
      font-family: 'IM Fell English', serif;
      font-size: 0.58rem;
      text-align: center;
      color: var(--ink-dim);
      word-break: keep-all;
      overflow-wrap: break-word;
      hyphens: none;
      line-height: 1.35;
      max-width: 78px;
    }

    .reel-fade-top, .reel-fade-bottom {
      position: absolute;
      left: 0; right: 0;
      height: 28px;
      pointer-events: none;
      z-index: 5;
    }
    .reel-fade-top    { top: 0;    background: linear-gradient(180deg, var(--stone), transparent); }
    .reel-fade-bottom { bottom: 0; background: linear-gradient(0deg,   var(--stone), transparent); }

    .reel-divider {
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(201,160,48,0.15), transparent);
    }

    /* Cast button */
    .spin-btn {
      display: block;
      width: 100%;
      margin-top: 9px;
      padding: 11px 14px;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--ink);
      background: linear-gradient(180deg, #3a2010 0%, #1e0e06 100%);
      border: 1px solid rgba(201,160,48,0.35);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 2px 0 #0a0503,
        0 4px 14px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.05);
      transition: background 0.12s, box-shadow 0.08s, transform 0.08s;
    }

    /* Gold top line */
    .spin-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,160,48,0.6), transparent);
    }

    .spin-btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #4a2c18 0%, #2a1408 100%);
      box-shadow:
        0 2px 0 #0a0503,
        0 4px 20px rgba(0,0,0,0.6),
        0 0 18px rgba(201,160,48,0.12),
        inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .spin-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 0 0 #0a0503, 0 2px 8px rgba(0,0,0,0.4);
    }

    .spin-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Section divider */
    .section-divider {
      position: relative;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,160,48,0.2), transparent);
      margin: 16px 0;
    }
    .section-divider::before {
      content: '✦';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: var(--gold);
      font-size: 0.65rem;
      opacity: 0.45;
      background: #120a04;
      padding: 0 10px;
    }

    /* Bottom beam */
    .beam-bottom {
      background: linear-gradient(180deg, var(--wood-mid) 0%, var(--wood-light) 100%);
      border-top: 1px solid rgba(201,160,48,0.25);
      padding: 9px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Win animation */
    @keyframes gemPulse {
      0%, 100% { box-shadow: 0 0 8px currentColor, inset 0 3px 6px rgba(255,255,255,0.18); }
      50%       { box-shadow: 0 0 22px currentColor, 0 0 44px currentColor, inset 0 3px 6px rgba(255,255,255,0.25); }
    }

    .reel-dot.win {
      animation: gemPulse 0.65s ease 3;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-runes">ᚱ ᚨ ᚾ ᛞ ᛗ</div>
    <h1>⚔ Свиток Красок</h1>
    <div class="subtitle">Paint Randomizer · For the Brave Miniaturist</div>
  </div>

  <div class="grimoire">
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <div class="beam">
      <div class="rune-strip">
        <span class="rune">ᛁ</span>
        <span class="rune">ᚾ</span>
        <span class="rune">ᚲ</span>
      </div>
      <div class="beam-label">Хроника Чародея</div>
      <div class="rune-strip">
        <span class="rune">ᚲ</span>
        <span class="rune">ᚾ</span>
        <span class="rune">ᛁ</span>
      </div>
    </div>

    <div class="grimoire-body">
      <div class="sections">

        <div class="reel-section">
          <div class="section-label">⚔ Основные цвета · Base Colours</div>
          <div class="reel-window" id="baseWindow">
            <div class="reel-fade-top"></div>
            <div class="reel-fade-bottom"></div>
          </div>
          <button class="spin-btn" id="baseBtn" onclick="spinBase()">✦ Воззвать Судьбу</button>
        </div>

        <div class="section-divider"></div>

        <div class="reel-section">
          <div class="section-label">💧 Тень · Wash</div>
          <div class="reel-window" id="washWindow">
            <div class="reel-fade-top"></div>
            <div class="reel-fade-bottom"></div>
          </div>
          <button class="spin-btn" id="washBtn" onclick="spinWash()">✦ Воззвать Судьбу</button>
        </div>

        <div class="section-divider"></div>

        <div class="reel-section">
          <div class="section-label">🖌 Рельеф · Dry Brush</div>
          <div class="reel-window" id="dryWindow">
            <div class="reel-fade-top"></div>
            <div class="reel-fade-bottom"></div>
          </div>
          <button class="spin-btn" id="dryBtn" onclick="spinDry()">✦ Воззвать Судьбу</button>
        </div>

      </div>
    </div>

    <div class="beam beam-bottom">
      <div class="rune-strip">
        <span class="rune">ᛗ</span>
        <span class="rune">ᛁ</span>
        <span class="rune">ᚾ</span>
      </div>
      <div class="beam-label">Fiat Lux · Fiat Color</div>
      <div class="rune-strip">
        <span class="rune">ᚾ</span>
        <span class="rune">ᛁ</span>
        <span class="rune">ᛗ</span>
      </div>
    </div>
  </div>

  <script>
    const basePaints = [
      "Черная","Белая","Желтая","Желтая сера","Пчела","Электрик лайм",
      "Киноварь","Ржавчина оранжевая","Алый","Бордовый","Рубиново-красный",
      "Черно-красный","Фиолетовая","Индиго","Пурпурный","Лаймово-зеленый",
      "Оливковый","Изумрудный","Русская зеленая","Глубокий синевато-зеленый",
      "Зеленый гоблин","Зеленый сок","Серый бетон","Кобальт синий",
      "Ярко синяя","Ночной синий","Коричневый","Красновато-коричневый",
      "Темная красно-коричневая","Телесная ультра нежная","Телесная",
      "Телесная кофейная","Телесный тени"
    ];

    const washes = [
      "Nuln Oil","Agrax Earthshade","Reikland Fleshshade",
      "Drakenhof Nightshade","Seraphim Sepia","Coelia Greenshade"
    ];

    const colorMap = {
      "Черная":"#111111","Белая":"#FFFFFF","Желтая":"#FFD300",
      "Желтая сера":"#EDFF21","Пчела":"#FFB900","Электрик лайм":"#CCFF00",
      "Киноварь":"#E34234","Ржавчина оранжевая":"#B7410E","Алый":"#FF2400",
      "Бордовый":"#800020","Рубиново-красный":"#9B111E","Черно-красный":"#412227",
      "Фиолетовая":"#800080","Индиго":"#560591","Пурпурный":"#800080",
      "Лаймово-зеленый":"#32CD32","Оливковый":"#808000","Изумрудный":"#50C878",
      "Русская зеленая":"#679267","Глубокий синевато-зеленый":"#00382B",
      "Зеленый гоблин":"#19b535","Зеленый сок":"#3bde39","Серый бетон":"#818479",
      "Кобальт синий":"#0047AB","Ярко синяя":"#0000FF","Ночной синий":"#191970",
      "Коричневый":"#964B00","Красновато-коричневый":"#A52A2A",
      "Темная красно-коричневая":"#C04000","Телесная ультра нежная":"#F4D5BB",
      "Телесная":"#C68642","Телесная кофейная":"#8D5524","Телесный тени":"#5a3d28",
      "Nuln Oil":"#1a1a1a","Agrax Earthshade":"#6b3a1f",
      "Reikland Fleshshade":"#a0522d","Drakenhof Nightshade":"#1a3a5c",
      "Seraphim Sepia":"#8b6914","Coelia Greenshade":"#1a5c3a"
    };

    function getColor(name) {
      return colorMap[name] || stringToColor(name);
    }

    function stringToColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      let color = '#';
      for (let i = 0; i < 3; i++) color += ('00' + ((hash >> (i*8)) & 0xFF).toString(16)).slice(-2);
      return color;
    }

    function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function getRandomUnique(arr, count) {
      return [...arr].sort(() => Math.random() - 0.5).slice(0, count);
    }

    function createReel(pool) {
      const reel = document.createElement('div');
      reel.className = 'reel';

      const strip = document.createElement('div');
      strip.className = 'reel-strip';

      const item = document.createElement('div');
      item.className = 'reel-item';

      const dot = document.createElement('div');
      dot.className = 'reel-dot';

      const name = document.createElement('div');
      name.className = 'reel-name';

      item.appendChild(dot);
      item.appendChild(name);
      strip.appendChild(item);
      reel.appendChild(strip);

      const initial = getRandom(pool);
      dot.style.backgroundColor = getColor(initial);
      name.textContent = initial;

      return { reel, dot, name };
    }

    function buildSection(windowId, count, pool) {
      const win = document.getElementById(windowId);
      win.querySelectorAll('.reel, .reel-divider').forEach(el => el.remove());

      const reels = [];
      for (let i = 0; i < count; i++) {
        if (i > 0) {
          const div = document.createElement('div');
          div.className = 'reel-divider';
          win.appendChild(div);
        }
        const r = createReel(pool);
        win.appendChild(r.reel);
        reels.push(r);
      }
      return reels;
    }

    function spinReel(dot, name, finalName, pool, delay) {
      return new Promise(resolve => {
        setTimeout(() => {
          const totalSteps = 16;
          const baseInterval = 45;
          const slowdown = 1.38;
          let step = 0;
          let interval = baseInterval;

          function tick() {
            step++;
            if (step >= totalSteps) {
              dot.style.backgroundColor = getColor(finalName);
              name.textContent = finalName;
              dot.classList.remove('win');
              void dot.offsetWidth;
              dot.classList.add('win');
              setTimeout(() => dot.classList.remove('win'), 1950);
              resolve();
              return;
            }
            const rand = getRandom(pool);
            dot.style.backgroundColor = getColor(rand);
            name.textContent = rand;
            interval = Math.min(interval * slowdown, 350);
            setTimeout(tick, interval);
          }

          tick();
        }, delay);
      });
    }

    async function spinSection(windowId, btnId, pool, count, delayBetween = 200) {
      const btn = document.getElementById(btnId);
      btn.disabled = true;

      const finals = getRandomUnique(pool, count);
      const reels = buildSection(windowId, count, pool);

      const promises = reels.map((r, i) =>
        spinReel(r.dot, r.name, finals[i], pool, i * delayBetween)
      );

      await Promise.all(promises);
      btn.disabled = false;
    }

    function spinBase() { spinSection('baseWindow', 'baseBtn', basePaints, 4, 180); }
    function spinWash() { spinSection('washWindow',  'washBtn', washes, 1, 0); }
    function spinDry()  { spinSection('dryWindow',   'dryBtn',  basePaints, 1, 0); }

    window.onload = () => {
      buildSection('baseWindow', 4, basePaints);
      buildSection('washWindow', 1, washes);
      buildSection('dryWindow',  1, basePaints);
    };
  </script>
</body>
</html>
